spring:
  # 1. Je donne un nom unique Ó ce microservice (son "nom de dresseur")
  application:
    name: identity-service

  # 2. Ici, je donne les coordonnķes pour trouver ma base de donnķes MySQL sur Docker
  datasource:
    # L'adresse "localhost:3306" et le nom de la base qu'on a crķķ sur Workbench
    url: jdbc:mysql://localhost:3306/poketcg_db?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 3. Hibernate, c'est l'outil qui traduit mon Java en SQL automatiquement
  jpa:
    hibernate:
      # "update" dit Ó l'appli : "Si les tables n'existent pas dans MySQL, crķe-les tout de suite"
      ddl-auto: update
    # "true" me permet de voir les requĻtes SQL dans la console en bas pour vķrifier mon code
    show-sql: true
    properties:
      hibernate:
        # Je prķcise que je parle le "dialecte" MySQL 8
        dialect: org.hibernate.dialect.MySQLDialect

  # 4. Ici, mon microservice va s'inscrire dans l'annuaire Consul
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        # Je dis Ó Consul : "Inscris-moi sous mon nom identity-service"
        service-name: ${spring.application.name}
        # On dit Ó Consul de nous appeler par notre IP et non par le nom du PC
        prefer-ip-address: true

# 5. Je dķfinis le port de ce service. Le 8080 est souvent pris, donc je prends le 8081.
server:
  port: 8081